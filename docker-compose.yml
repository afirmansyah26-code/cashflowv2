version: '3.8'

services:
  cashflow:
    build: .
    container_name: cashflow_zimaos
    restart: unless-stopped
    ports:
      - "6090:6090"
    volumes:
      - ./storage:/app/storage
      - ./.env:/app/.env
    environment:
      - COOKIE_SECURE=false
      - NODE_ENV=production
      - TZ=Asia/Jakarta
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
